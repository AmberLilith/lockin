<form [formGroup]="registerFormGroup" class="d-grid gap-2">
    @if(errorMessage){
    <div class="alert alert-danger py-2">{{ errorMessage }}</div>
    }

    <div class="form-floating">
        <input type="email" class="form-control" placeholder="Email" formControlName="email"
            [class.is-invalid]="email?.invalid && email?.touched">
        <label>Email</label>
        <div class="invalid-feedback">Email inválido</div>
    </div>

    <div class="input-group">
        <div class="form-floating">
            <input [type]="showPass ? 'text' : 'password'" class="form-control" placeholder="Senha"
                formControlName="password" [class.is-invalid]="password?.invalid && password?.touched">
            <label>Senha</label>
        </div>
        <button class="btn btn-outline-secondary" type="button" (click)="showPass=!showPass">
            <icon [name]="showPass ? 'visibility-off' : 'visibility'"></icon>
        </button>
    </div>
    @if(password?.invalid && password?.touched){
    <div class="text-danger small">Mínimo 6 caracteres</div>
    }

    <div class="form-floating">
        <input [type]="showPass ? 'text' : 'password'" class="form-control" placeholder="Confirmar senha"
            formControlName="confirmPassword" [class.is-invalid]="passwordMismatch">
        <label>Confirmar senha</label>
        <div class="invalid-feedback">As senhas não coincidem</div>
    </div>

    <button type="button" class="btn btn-primary" (click)="register()">
        Criar conta
    </button>
    <button type="button" class="btn btn-outline-secondary" (click)="onCancel.emit()">
        Cancelar
    </button>
</form>

<app-alert #alertWait [message]="'Aguarde...'" [type]="'info'" [autoDismiss]="false" [vertical]="'center'" [horizontal]="'center'" [allowClosing]="false">
    <div class="spinner-border text-primary" role="status" alert-content>
    </div>
</app-alert>
